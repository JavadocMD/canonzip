repos:
  - repo: local
    hooks:
      - id: uv-lock-check
        name: uv lock check
        language: system
        entry: uv lock --locked
        pass_filenames: false
      - id: ruff-check
        name: ruff check
        language: system
        entry: uv run ruff check --force-exclude
        types_or: [python, pyi]
        pass_filenames: true
      - id: ruff-format
        name: ruff format
        language: system
        entry: uv run ruff format --check --force-exclude
        types_or: [python, pyi]
        pass_filenames: true
